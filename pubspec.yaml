name: ghost_lock_ai
description: A sophisticated digital vault disguised as a normal app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Database & Storage
  sqflite: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # Authentication & Security
  local_auth: ^2.1.8
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  firebase_storage: ^11.6.0
  cloud_firestore: ^4.15.0

  # Media & Files
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  video_player: ^2.8.2
  photo_view: ^0.14.0
  permission_handler: ^11.1.0
  camera: ^0.10.5+9

  # UI Components
  flutter_animate: ^4.3.0
  glassmorphism: ^3.0.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  animations: ^2.0.8

  # AI & Voice
  speech_to_text: ^6.6.0
  record: ^5.0.4

  # Utilities
  uuid: ^4.2.2
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  device_info_plus: ^9.1.1
  package_info_plus: ^5.0.1
  screenshot: ^2.3.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.3
  get_it: ^7.6.4
  injectable: ^2.3.2
  dartz: ^0.10.1
  rxdart: ^0.27.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
